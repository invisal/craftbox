name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # uiohook-napi (global input capture, screen-recorder cursor/click
      # tracking) has no prebuilt binary for Electron's ABI, so
      # `electron-builder install-app-deps` (npm's postinstall) falls back to
      # compiling its libuiohook dependency from source -- which needs these
      # X11 dev headers on Linux runners (not installed by default).
      - name: Install libuiohook build dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxrandr-dev libxt-dev

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install libuiohook build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxrandr-dev libxt-dev

      - run: npm ci

      - name: Build
        run: npm run build
