name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # uiohook-napi (global input capture, screen-recorder cursor/click
      # tracking) has no prebuilt binary for Electron's ABI, so
      # `electron-builder install-app-deps` (npm's postinstall) falls back to
      # compiling its libuiohook dependency from source -- which needs these
      # X11 dev headers on Linux runners (not installed by default).
      - name: Install libuiohook build dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxrandr-dev libxt-dev

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Knip
        run: npm run knip

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # libx11-dev/libxtst-dev/libxt-dev: uiohook-napi's libuiohook dependency
      # (no prebuilt binary for Electron's ABI, so it compiles from source).
      # libxext-dev/libxfixes-dev: native/linux-recorder's own XShm/XFixes
      # build dependencies (libx11-dev/libxrandr-dev already covers the rest
      # it needs). See recording-helper.ts.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxrandr-dev libxt-dev libxext-dev libxfixes-dev

      - run: npm ci

      # Native recording helper subprocesses (native/macos-recorder,
      # native/windows-recorder, native/linux-recorder) -- see
      # recording-helper.ts. Compile-only verification; none of the three
      # can be functionally exercised on a CI runner (no real display/
      # permission session), same caveat as the rest of this native-capture
      # work -- macOS has separately been verified with a real recording
      # during development, Windows/Linux have not.
      - name: Build native recording helper (macOS)
        if: runner.os == 'macOS'
        run: npm run build:native:macos

      - name: Build native recording helper (Windows)
        if: runner.os == 'Windows'
        run: npm run build:native:windows

      - name: Build native recording helper (Linux)
        if: runner.os == 'Linux'
        run: npm run build:native:linux

      - name: Build
        run: npm run build
