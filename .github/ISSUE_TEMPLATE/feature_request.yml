name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Which tool does this relate to?
      description: e.g. File Explorer, HTTP Client, Kubernetes, Screen Capture, Screen Recorder, or a new tool idea
    validations:
      required: false
